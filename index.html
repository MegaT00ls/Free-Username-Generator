<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Futuristic 3D Username Generator | MegaTools</title>
<meta name="description" content="Generate unique, aesthetic & professional usernames with an interactive 3D floating robot background!">
<meta name="keywords" content="username generator, 3D robot, Three.js, free tool, UI, interactive">
<meta name="author" content="MegaTools">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
  body {
    background:#0f172a;
    overflow-x:hidden;
    position:relative;
    min-height:100vh;
  }
  #threejs-canvas {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    z-index:0;
  }
  .container {
    position:relative;
    z-index:1;
    margin:60px auto;
    background:rgba(255,255,255,0.1);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:25px;
    max-width:750px;
    color:#fff;
    box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  h1{font-size:38px;color:#fff;text-align:center;margin-bottom:8px;}
  p{color:#94a3b8;margin-bottom:18px;text-align:center;}

  input,select,button {
    width:100%;padding:14px; margin:8px 0; border-radius:12px; border:none;
    font-size:16px;outline:none;
  }
  input{background:rgba(255,255,255,0.1);color:#fff;}
  input:focus{background:rgba(255,255,255,0.2);}
  select{background:#fff;color:#000;}

  button{
    background:linear-gradient(90deg,#22c55e,#38bdf8);
    color:#000;font-weight:bold;cursor:pointer;
    transition:0.3s;
  }
  button:hover {transform:scale(1.05);}

  .copy-all{background:linear-gradient(90deg,#facc15,#f43f5e);}

  .result{background:rgba(255,255,255,0.1);padding:14px; margin:8px 0;border-radius:10px;display:flex;justify-content:space-between;align-items:center;}
  .copy-btn{background:#6366f1;color:#fff;padding:8px 12px;border-radius:8px;cursor:pointer;}

  .footer{margin-top:25px;text-align:center;color:#94a3b8;font-size:14px;}
</style>
</head>
<body>

<!-- Three.js WebGL Canvas -->
<canvas id="threejs-canvas"></canvas>

<div class="container">
  <h1>🤖 Interactive 3D Username Generator</h1>
  <p>Generate unique usernames with futuristic visuals!</p>

  <input type="text" id="name" placeholder="Enter your name or keyword">
  <select id="style">
    <option value="cool">Cool 😎</option>
    <option value="aesthetic">Aesthetic 🌙</option>
    <option value="gaming">Gaming 🎮</option>
    <option value="business">Business 💼</option>
    <option value="random">Random 🌟</option>
  </select>

  <button onclick="generate()">Generate Usernames</button>
  <button class="copy-all" onclick="copyAll()">Copy All</button>

  <div id="output"></div>

  <div class="footer">
    ❤️ Made with 3D by MegaTools • <a href="https://www.buymeacoffee.com/yourprofile" target="_blank">Support me</a>
  </div>
</div>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.min.js"></script>
<!-- GLTFLoader -->
<script src="https://cdn.jsdelivr.net/npm/three@0.150.1/examples/js/loaders/GLTFLoader.js"></script>

<script>
const canvas = document.getElementById("threejs-canvas");
const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,1.2,2);

const light1 = new THREE.DirectionalLight(0xffffff, 1);
light1.position.set(0,10,10);
scene.add(light1);

const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

// Load robot model
const loader = new THREE.GLTFLoader();
loader.load('robot.glb', gltf => {
  const robot = gltf.scene;
  robot.scale.set(1.2,1.2,1.2);
  robot.position.set(0, -0.8, -2);
  scene.add(robot);

  // Animate robot
  function animateRobot() {
    robot.rotation.y += 0.005;
    requestAnimationFrame(animateRobot);
  }
  animateRobot();
});

function animate() {
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}
animate();

// Adjust on resize
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
});
</script>

<script>
// Username generator logic
function generate() {
  const name = document.getElementById("name").value || "user";
  const style = document.getElementById("style").value;
  const output = document.getElementById("output");
  const combos = {
    cool:["x","pro","vibe","zone","flash"],
    aesthetic:["moon","cloud","soft","dream","mist"],
    gaming:["ghost","blade","strike","sniper","legend"],
    business:["official","global","brand","hq","team"],
    random:["alpha","nova","prime","zen","cyber"]
  };
  let list = [];
  for(let i=0;i<10;i++){
    list.push(name+"_"+combos[style][Math.floor(Math.random()*combos[style].length)]+Math.floor(Math.random()*999));
  }
  output.innerHTML = "";
  list.forEach(item => {
    const div = document.createElement("div");
    div.className = "result";
    div.innerHTML = `<span>${item}</span><button class="copy-btn" onclick="navigator.clipboard.writeText('${item}')">Copy</button>`;
    output.appendChild(div);
  });
}
function copyAll(){
  const items=document.querySelectorAll(".result span");
  let allText="";
  items.forEach(i=>allText+=i.textContent+"\n");
  navigator.clipboard.writeText(allText);
  alert("All Copied!");
}
</script>

</body>
</html>
